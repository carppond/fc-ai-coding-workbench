<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拾光 AI 编程平台</title>
  </head>
  <body style="background-color: #1e1e2e; margin: 0;">
    <div id="root">
      <!-- Splash screen: shown instantly, replaced when React mounts -->
      <div id="splash" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        color: #cdd6f4;
      ">
        <img src="/src/assets/app-icon.png" alt="" style="width: 64px; height: 64px; border-radius: 14px;" />
        <div style="
          width: 24px; height: 24px;
          border: 2px solid #45475a;
          border-top-color: #89b4fa;
          border-radius: 50%;
          animation: sp 0.6s linear infinite;
        "></div>
      </div>
      <style>@keyframes sp { to { transform: rotate(360deg); } }</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
