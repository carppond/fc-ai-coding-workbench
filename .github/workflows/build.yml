name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            args: --target universal-apple-darwin
            label: macOS-universal
          - platform: windows
            os: windows-latest
            args: ""
            label: Windows-x64
          - platform: linux
            os: ubuntu-22.04
            args: ""
            label: Linux-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Linux system dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tauriScript: npx tauri

      # Collect artifacts manually (tauri-action uploads to release on tags,
      # but we also want downloadable artifacts for workflow_dispatch runs)
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find src-tauri/target -type f \( \
            -name "*.dmg" \
            -o -name "*.deb" \
            -o -name "*.AppImage" \
            -o -name "*.msi" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
          \) ! -name "rw.*" -exec cp {} artifacts/ \; 2>/dev/null || true
          # Windows NSIS installer
          find src-tauri/target -path "*/bundle/nsis/*.exe" -exec cp {} artifacts/ \; 2>/dev/null || true
          echo "=== Collected artifacts ==="
          ls -lhR artifacts/ 2>/dev/null || echo "artifacts dir empty"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.label }}
          path: artifacts/*
          retention-days: 30
          if-no-files-found: warn

  # Create GitHub Release when triggered by tag
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
